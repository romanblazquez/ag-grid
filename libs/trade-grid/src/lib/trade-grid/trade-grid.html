<div class="trade-grid-container" (click)="hideContextMenu()" tabindex="0" (keydown.enter)="hideContextMenu()" (keydown.space)="hideContextMenu()">
  <div class="grid-toolbar">
    <button
      class="bulk-cancel-btn"
      (click)="onCancelSelected()"
      [disabled]="selectedActiveCount === 0"
    >
      Cancel Selected ({{ selectedActiveCount }})
    </button>
  </div>

  <ag-grid-angular
    class="trade-grid"
    [theme]="theme"
    [rowData]="rowData"
    [columnDefs]="columnDefs"
    [defaultColDef]="defaultColDef"
    [pagination]="true"
    [paginationPageSize]="50"
    [rowSelection]="rowSelectionOptions"
    [animateRows]="true"
    (gridReady)="onGridReady($event)"
    (selectionChanged)="onSelectionChanged()"
    (contextmenu)="onContextMenu($event)"
  ></ag-grid-angular>

  <!-- Custom Context Menu -->
  <div
    *ngIf="showContextMenu"
    class="custom-context-menu"
    role="menu"
    tabindex="0"
    [style.left.px]="contextMenuX"
    [style.top.px]="contextMenuY"
  >
    <button
      type="button"
      class="context-menu-item"
      [class.disabled]="selectedActiveCount === 0"
      [disabled]="selectedActiveCount === 0"
      (click)="onContextMenuCancelSelected(); hideContextMenu()"
    >
      <span class="menu-icon">✖</span>
      <span>Cancel Selected ({{ selectedActiveCount }})</span>
    </button>
    <button type="button" class="context-menu-item" (click)="hideContextMenu()">
      <span class="menu-icon">📋</span>
      <span>Copy</span>
    </button>
    <button type="button" class="context-menu-item" (click)="hideContextMenu()">
      <span class="menu-icon">📊</span>
      <span>Export</span>
    </button>
  </div>
</div>
