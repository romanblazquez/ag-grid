<div class="trade-grid-container" tabindex="0">
  <div class="grid-toolbar">
    <button
      mat-raised-button
      color="warn"
      class="bulk-cancel-btn"
      (click)="onCancelSelected()"
      [disabled]="selectedActiveCount === 0"
      matTooltip="Cancel all selected active trades"
      matTooltipPosition="above"
    >
      <mat-icon>cancel</mat-icon>
      Cancel Selected
      <span 
        *ngIf="selectedActiveCount > 0" 
        class="selected-count"
        matBadge="{{ selectedActiveCount }}"
        matBadgePosition="after"
        matBadgeColor="accent"
        matBadgeSize="small"
      ></span>
    </button>
  </div>

  <ag-grid-angular
    class="trade-grid"
    [theme]="theme"
    [rowData]="rowData"
    [columnDefs]="columnDefs"
    [defaultColDef]="defaultColDef"
    [gridOptions]="gridOptions"
    [modules]="modules"
    [animateRows]="true"
    (gridReady)="onGridReady($event)"
    (selectionChanged)="onSelectionChanged()"
  ></ag-grid-angular>
</div>
