<tp-search-bar
  (clearEvent)="clearSearch($event)"
  (searchEvent)="getSuggestions($event)"
  (selectEvent)="selectSuggestion($event)"
  [autoSelectFirstOptionOnUpdate]="autoSelectFirstOptionOnUpdate"
  [clearSymbol]="clearSymbol"
  [defaultResults]="defaultSuggestions!"
  [disabled]="disabled"
  [displayFunction]="displayFunction!"
  [dropDownWidth]="dropDownWidth!"
  [enableClearButton]="enableClearButton"
  [errorMessage]="errorMessage"
  [hideArrowDropDown]="hideArrowDropDown"
  [placeholderText]="placeholderText!"
  [requiredSearch]="requiredSearch"
  [searchBarWidth]="searchBarWidth!"
  [searchResultColumnWidths]="searchResultColumnWidths"
  [searchResultColumnsToolTip]="searchResultColumnsToolTip"
  [searchResultColumns]="searchResultColumns"
  [searchResults]="suggestibleSearchResults | async"
  [searchTouched]="searchTouched"
  [useMatError]="useMatError"
></tp-search-bar>
