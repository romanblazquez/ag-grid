<ul class="hds-canned-dates">
  @for (cannedDate of cannedDates; track cannedDate) {
    <li>
      <p-button
        [label]="cannedDate"
        severity="secondary"
        [text]="true"
        size="small"
        styleClass="hds-canned-dates__btn w-full justify-start"
        (onClick)="onCannedDatePicked(cannedDate)"
      />
    </li>
  }
</ul>
