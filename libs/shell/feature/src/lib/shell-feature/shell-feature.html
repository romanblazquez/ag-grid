<div class="shell-feature-container">
  <header class="feature-header">
    <div class="header-content">
      <div class="title-section">
        <h1>Trade Platform</h1>
        <p class="subtitle">Real-time trading dashboard with live updates</p>
      </div>
      <div class="controls-section">
        <lib-theme-switcher 
          [selectedTheme]="currentTheme"
          (themeChanged)="onThemeChanged($event)"
        ></lib-theme-switcher>
      </div>
    </div>
  </header>

  <section class="trades-search-section">
    <lib-trades-search></lib-trades-search>
  </section>

  <section class="stats-section">
    <lib-stats-card
      title="Total Trades"
      [value]="totalTrades"
      icon="📊"
    ></lib-stats-card>

    <lib-stats-card
      title="Buy Orders"
      [value]="buyCount"
      icon="📈"
      trend="up"
    ></lib-stats-card>

    <lib-stats-card
      title="Sell Orders"
      [value]="sellCount"
      icon="📉"
      trend="down"
    ></lib-stats-card>
  </section>

    <section class="trade-section">
    <lib-trade-grid
      [rowData]="tradeData"
      [personService]="personService"
      [themeName]="currentTheme"
      (cancelTrade)="onCancelTrade($event)"
      (cancelSelectedTrades)="onCancelSelectedTrades($event)"
      (tradesConfirmedCancellation)="onTradesConfirmedCancellation($event)"
    ></lib-trade-grid>
  </section>
</div>
